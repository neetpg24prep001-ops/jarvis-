<!-- React 18 — no Babel needed, pure JS -->
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script>

// ═══════════════════════════════════════════════
// JARVIS 30-DAY — Pure JS, No Babel Required
// Uses React.createElement directly
// ═══════════════════════════════════════════════
const { useState, useEffect, useCallback, useRef } = React;
const e = React.createElement;

// ── Storage (localStorage) ──────────────────────
const STORAGE_KEY = "jarvis-master";
const APP_VERSION = 2;

function freshState() {
  return { version: APP_VERSION, days: {}, revs: [], nid: 1, rvws: {} };
}

function migrate(raw) {
  if (!raw) return freshState();
  let data;
  try { data = typeof raw === "string" ? JSON.parse(raw) : raw; }
  catch { return freshState(); }
  if (!data.version) {
    data = { version:1, days:data.days||data.dayData||{}, revs:data.revs||data.entries||[], nid:data.nid||data.nextId||1, rvws:data.rvws||data.reviews||{} };
  }
  if (data.version < 2) {
    const sm = {"Physio":"Physiology","Pharma":"Pharmacology","Patho":"Pathology","Med":"Medicine","Biochem":"Biochemistry","Micro":"Microbiology"};
    data.revs = (data.revs||[]).map(e => ({...e, subject: sm[e.subject]||e.subject||"Other"}));
    data.version = 2;
  }
  return { version:APP_VERSION, days:data.days||{}, revs:data.revs||[], nid:data.nid||1, rvws:data.rvws||{} };
}

function loadData() {
  try { return migrate(localStorage.getItem(STORAGE_KEY)); }
  catch { return freshState(); }
}

function saveData(s) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({...s, version:APP_VERSION})); } catch{}
}

// ── Constants ───────────────────────────────────
const START = new Date(2026, 3, 1);
const MS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const WD = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

const SUBJECTS = {
  "Physiology":{c:"#f43f5e",em:"🫀"},"Pharmacology":{c:"#8b5cf6",em:"⚗️"},
  "Pathology":{c:"#334155",em:"🔬"},"Medicine":{c:"#0ea5e9",em:"⚕️"},
  "PSM":{c:"#10b981",em:"📊"},"Biochemistry":{c:"#f59e0b",em:"🧬"},
  "Microbiology":{c:"#84cc16",em:"🦠"},"Anatomy":{c:"#e11d48",em:"🦴"},
  "FMT":{c:"#0891b2",em:"⚖️"},"Ophthalmology":{c:"#f97316",em:"👁️"},
  "ENT":{c:"#7c3aed",em:"👂"},"Dermatology":{c:"#db2777",em:"🧴"},
  "Anaesthesia":{c:"#64748b",em:"💉"},"Radiology":{c:"#0284c7",em:"🔭"},
  "Psychiatry":{c:"#9333ea",em:"🧠"},"Orthopaedics":{c:"#b45309",em:"🦿"},
  "Paediatrics":{c:"#16a34a",em:"👶"},"OBG":{c:"#be185d",em:"🌸"},
  "Surgery":{c:"#dc2626",em:"🔪"},"Other":{c:"#6b7280",em:"📚"}
};

const RANKS = [
  {name:"East Blue Rookie",min:0,bounty:"0",emoji:"📖"},
  {name:"Pirate",min:200,bounty:"10M",emoji:"🏴‍☠️"},
  {name:"Super Rookie",min:500,bounty:"50M",emoji:"⚡"},
  {name:"Grand Line Capt",min:900,bounty:"150M",emoji:"🔥"},
  {name:"New World Pirate",min:1400,bounty:"500M",emoji:"💪"},
  {name:"Yonko Commander",min:2000,bounty:"1B",emoji:"👑"},
  {name:"PIRATE KING",min:2800,bounty:"∞",emoji:"🏆"},
];

const XP_MAP = {
  water500:10,yoga:20,posture:10,workout:30,"left-8am":20,"study-ontime":25,
  water3l:10,nojunk:15,nosugar:15,protein:10,skincare:5,sunscreen:5,
  sleep1130:15,noscreen_am:20,noscreen_pm:15,journaled:20
};

const CREW = [
  {name:"Zoro",emoji:"⚔️",xp:0,color:"#22c55e",role:"First Mate"},
  {name:"Nami",emoji:"🌊",xp:200,color:"#f59e0b",role:"Navigator"},
  {name:"Usopp",emoji:"🎯",xp:500,color:"#84cc16",role:"Sniper"},
  {name:"Sanji",emoji:"🦵",xp:900,color:"#eab308",role:"Cook"},
  {name:"Chopper",emoji:"🦌",xp:1400,color:"#f43f5e",role:"Doctor"},
  {name:"Robin",emoji:"🌸",xp:2000,color:"#8b5cf6",role:"Historian"},
  {name:"Franky",emoji:"🤖",xp:2800,color:"#3b82f6",role:"Shipwright"},
];

const ALL_HABITS = ["water500","yoga","posture","workout","left-8am","study-ontime",
  "water3l","nojunk","nosugar","protein","skincare","sunscreen","sleep1130",
  "noscreen_am","noscreen_pm","journaled"];

// ── Helpers ─────────────────────────────────────
function today() { const d=new Date(); d.setHours(0,0,0,0); return d; }
function addDays(d,n) { const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function dkey(d) { return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`; }
function dayNum(d) { return Math.round((d-START)/86400000); }
function isWO(d) { return [2,4,6].includes(d.getDay()); }
function fmtDate(d) { return `${WD[d.getDay()]}, ${d.getDate()} ${MS[d.getMonth()]}`; }
function fmtShort(d) { return `${d.getDate()} ${MS[d.getMonth()]}`; }
function fromKey(k) { const [y,m,d]=k.split("-").map(Number); return new Date(y,m,d); }
function getRank(xp) { for(let i=RANKS.length-1;i>=0;i--) if(xp>=RANKS[i].min) return RANKS[i]; return RANKS[0]; }
function getNextRank(xp) { return RANKS.find(r=>r.min>xp)||null; }

function calcXP(days,revs) {
  let xp=0;
  Object.values(days).forEach(dd=>Object.entries(dd?.checks||{}).forEach(([k,v])=>{if(v&&XP_MAP[k])xp+=XP_MAP[k];}));
  (revs||[]).forEach(e=>{if(e.d1done)xp+=20;if(e.d4done)xp+=30;if(e.d7done)xp+=50;});
  return xp;
}

function getScore(dd) {
  const done=ALL_HABITS.filter(k=>dd?.checks?.[k]).length;
  return {done,total:ALL_HABITS.length,pct:Math.round(done/ALL_HABITS.length*100)};
}

// ── CSS (injected into head) ────────────────────


// ── Component helpers ────────────────────────────
function CI({checked, label, xp, onClick}) {
  return e('div', {className:'ci'+(checked?' ck':''), onClick},
    e('div', {className:'cb'}, checked ? '✓' : ''),
    e('span', {className:'ct'}, label),
    xp ? e('span', {className:'xc'}, '+'+xp+'XP') : null
  );
}

function Toast({msg, onDone}) {
  useEffect(() => {
    const t = setTimeout(onDone, 1800);
    return () => clearTimeout(t);
  }, [onDone]);

  return e('div', { className: 'toast' }, msg);
}

// ── MAIN APP COMPONENT ──
function App() {
  const [data, setData] = useState(loadData);
  const [view, setView] = useState(0); // 0:Home, 1:Logs, 2:Stats
  const [toast, setToast] = useState(null);

  useEffect(() => {
    saveData(data);
  }, [data]);

  const showToast = (m) => setToast(m);

  // Simple Page Router
  const renderPage = () => {
    const todayKey = dkey(today());
    const dayData = data.days[todayKey] || { checks: {} };

    if (view === 0) {
      return e('div', { className: 'pg' },
        e('div', { className: 'sb' },
          e('div', { className: 'sp' }, calcXP(data.days, data.revs)),
          e('div', { className: 'ss' }, 'TOTAL BOUNTY (XP)')
        ),
        e('div', { className: 'sc op' },
          e('div', { className: 'sc-t' }, '⚔️ DAILY OBJECTIVES'),
          ALL_HABITS.map(h => e(CI, {
            key: h,
            label: h.replace(/_/g, ' ').toUpperCase(),
            checked: !!dayData.checks[h],
            xp: XP_MAP[h],
            onClick: () => {
              const newData = { ...data };
              if (!newData.days[todayKey]) newData.days[todayKey] = { checks: {} };
              newData.days[todayKey].checks[h] = !newData.days[todayKey].checks[h];
              setData(newData);
              if (newData.days[todayKey].checks[h]) showToast("XP GAINED! 🏴‍☠️");
            }
          }))
        )
      );
    }
    return e('div', { className: 'pg' }, e('div', { className: 'em' }, 'More features loading soon...'));
  };

  return e('div', { className: 'app' },
    e('header', { className: 'hdr' },
      e('div', null,
        e('div', { className: 'ht' }, 'JARVIS-30'),
        e('div', { className: 'hs' }, 'NEW WORLD PROTOCOL')
      )
    ),
    renderPage(),
    toast && e(Toast, { msg: toast, onDone: () => setToast(null) }),
    e('div', { className: 'dots' },
      [0, 1, 2].map(i => e('div', {
        key: i,
        className: 'dot' + (view === i ? ' on' : ''),
        onClick: () => setView(i)
      }))
    )
  );
}

// ── MOUNT APP ──
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(e(App));

// Hide loader and show app
document.getElementById('loading').style.display = 'none';
document.getElementById('root').style.display = 'block';

</script>
</body>
</html>
