<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1e3a5f">
<title>Jarvis 30-Day</title>
<link rel="manifest" href="manifest.json">
<style>
@import url('https://fonts.googleapis.com/css2?family=Pirata+One&family=DM+Sans:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#fef9f0;--card:#fff;--c2:#fdf5e6;--bd:#f0d9a0;--ink:#1a0a00;--mt:#8b6914;--red:#dc2626;--gold:#d97706;--navy:#1e3a5f;--blue:#3b82f6;--purple:#7c3aed;--orange:#ea580c;--green:#059669;--hk:#f97316;--teal:#0f766e}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--ink);font-family:'DM Sans',sans-serif;font-size:14px}
.app{display:flex;flex-direction:column;height:100vh;max-width:500px;margin:0 auto;overflow:hidden}
.hdr{background:var(--navy);border-bottom:3px solid #ffd700;padding:10px 14px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.ht{font-family:'Pirata One',serif;font-size:18px;color:#ffd700;line-height:1}
.hs{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:#94a3b8;margin-top:2px}
.pg{flex:1;overflow-y:auto;padding:14px}
.sc{background:var(--card);border:2px solid var(--bd);border-radius:8px;padding:12px;margin-bottom:7px;border-top:3px solid var(--red)}
.sc-t{font-family:'Pirata One',serif;font-size:14px;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.ci{display:flex;align-items:center;gap:9px;padding:9px 10px;margin-bottom:3px;background:var(--c2);border-radius:6px;cursor:pointer}
.ci.ck{background:#f0fdf4}
.ci.ck .ct{color:#86efac;text-decoration:line-through}
.cb{width:20px;height:20px;border-radius:5px;border:1.5px solid var(--bd);background:white;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ci.ck .cb{background:#22c55e;border-color:#22c55e;color:white}
.ct{font-size:13px;color:var(--ink);flex:1;line-height:1.3}
.xc{font-size:9px;color:var(--gold);font-weight:700}
.sb{background:var(--navy);border:2px solid #ffd700;border-radius:8px;padding:14px;text-align:center;margin-bottom:7px}
.sp{font-family:'Pirata One',serif;font-size:38px;color:#ffd700;line-height:1;margin-bottom:4px}
.ss{font-size:11px;color:#94a3b8}
.toast{position:fixed;top:68px;left:50%;transform:translateX(-50%);background:var(--navy);border:2px solid #ffd700;border-radius:7px;padding:9px 18px;color:#ffd700;font-family:'Pirata One',serif;font-size:15px;z-index:999;animation:ti .3s ease}
@keyframes ti{from{opacity:0;transform:translateX(-50%) translateY(-8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.dots{display:flex;justify-content:center;gap:6px;padding:10px;background:var(--bg)}
.dot{width:6px;height:6px;border-radius:50%;background:var(--bd)}
.dot.on{background:var(--red);width:18px;border-radius:3px}
#loading{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#ffd700;background:#1e3a5f}
.sp2{width:28px;height:28px;border:2px solid #ffd70050;border-top-color:#ffd700;border-radius:50%;animation:spin2 1s linear infinite;margin-top:20px}
@keyframes spin2{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="loading">
  <div style="font-size:52px;margin-bottom:12px">🏴‍☠️</div>
  <div style="font-size:22px;font-family:'Pirata One'">JARVIS 30-DAY</div>
  <div class="sp2"></div>
</div>
<div id="root" style="display:none"></div>

<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
const { useState, useEffect } = React;
const e = React.createElement;

const STORAGE_KEY = "jarvis-master";
const XP_MAP = {
  water500:10, yoga:20, posture:10, workout:30, "left-8am":20, "study-ontime":25,
  water3l:10, nojunk:15, nosugar:15, protein:10, skincare:5, sunscreen:5,
  sleep1130:15, noscreen_am:20, noscreen_pm:15, journaled:20
};
const ALL_HABITS = Object.keys(XP_MAP);

function loadData() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || { days: {} }; }
  catch { return { days: {} }; }
}

function saveData(s) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
}

function dkey() { 
  const d = new Date(); 
  return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`; 
}

function App() {
  const [data, setData] = useState(loadData());
  const [toast, setToast] = useState(null);

  useEffect(() => { saveData(data); }, [data]);

  const todayKey = dkey();
  const dayData = data.days[todayKey] || { checks: {} };

  const toggle = (h) => {
    const newData = { ...data };
    if (!newData.days[todayKey]) newData.days[todayKey] = { checks: {} };
    const newVal = !newData.days[todayKey].checks[h];
    newData.days[todayKey].checks[h] = newVal;
    setData(newData);
    if (newVal) {
      setToast("BOUNTY INCREASED! 🏴‍☠️");
      setTimeout(() => setToast(null), 1800);
    }
  };

  const totalXP = Object.values(data.days).reduce((acc, day) => {
    Object.entries(day.checks || {}).forEach(([k, v]) => { if(v && XP_MAP[k]) acc += XP_MAP[k]; });
    return acc;
  }, 0);

  return e('div', { className: 'app' },
    e('header', { className: 'hdr' },
      e('div', null,
        e('div', { className: 'ht' }, 'JARVIS-30'),
        e('div', { className: 'hs' }, 'NEW WORLD PROTOCOL')
      )
    ),
    e('div', { className: 'pg' },
      e('div', { className: 'sb' },
        e('div', { className: 'sp' }, totalXP),
        e('div', { className: 'ss' }, 'TOTAL BOUNTY (XP)')
      ),
      e('div', { className: 'sc' },
        e('div', { className: 'sc-t' }, '⚔️ DAILY OBJECTIVES'),
        ALL_HABITS.map(h => e('div', {
          key: h,
          className: 'ci' + (dayData.checks[h] ? ' ck' : ''),
          onClick: () => toggle(h)
        },
          e('div', { className: 'cb' }, dayData.checks[h] ? '✓' : ''),
          e('span', { className: 'ct' }, h.replace(/-/g, ' ').toUpperCase()),
          e('span', { className: 'xc' }, '+' + XP_MAP[h] + 'XP')
        ))
      )
    ),
    toast && e('div', { className: 'toast' }, toast),
    e('div', { className: 'dots' }, [0,1,2].map(i => e('div', { key: i, className: 'dot' + (i===0?' on':'') })))
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(e(App));

setTimeout(() => {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('root').style.display = 'block';
}, 500);
</script>
</body>
</html>
