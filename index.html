// ═══════════════════════════════════════════════════════════════════════════
//  MIGRATION SYSTEM
//  ─────────────────────────────────────────────────────────────────────────
//  HOW IT WORKS:
//  - Every save uses key "jarvis-master" (never changes)
//  - Data is versioned. When you add features, bump APP_VERSION.
//  - migrate() reads whatever old shape the data is in and returns the
//    current shape — merging, never deleting existing entries.
//  - This means adding subjects / habits / features never loses old data.
//
//  TO ADD A NEW FEATURE IN FUTURE:
//  1. Bump APP_VERSION by 1
//  2. Add a migration step in migrate() for that version
//  3. Add your new feature to the app
//  Old data is preserved automatically.
// ═══════════════════════════════════════════════════════════════════════════
const APP_VERSION = 2;
const STORAGE_KEY = "jarvis-master"; // NEVER change this key

function migrate(raw) {
  if (!raw) return freshState();

  let data = typeof raw === "string" ? JSON.parse(raw) : raw;

  // v0 → v1: wrap legacy flat structure into versioned envelope
  if (!data.version) {
    data = {
      version: 1,
      days:  data.days  || data.dayData || {},
      revs:  data.revs  || data.entries || [],
      nid:   data.nid   || data.nextId  || 1,
      rvws:  data.rvws  || data.reviews || {},
    };
  }

  // v1 → v2: subjects stored on rev entries used short keys;
  //          map old short keys to new full names just in case
  if (data.version < 2) {
    const subjectMap = {
      "Physio":"Physiology", "Pharma":"Pharmacology", "Patho":"Pathology",
      "Med":"Medicine", "Biochem":"Biochemistry", "Micro":"Microbiology",
    };
    data.revs = (data.revs || []).map(e => ({
      ...e,
      subject: subjectMap[e.subject] || e.subject || "Other",
    }));
    data.version = 2;
  }

  // Always forward-fill missing fields so new features work on old data
  return {
    version: APP_VERSION,
    days: data.days  || {},
    revs: data.revs  || [],
    nid:  data.nid   || 1,
    rvws: data.rvws  || {},
  };
}

function freshState() {
  return { version: APP_VERSION, days: {}, revs: [], nid: 1, rvws: {} };
}

async function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return migrate(raw);
  } catch { return freshState(); }
}

async function saveData(state) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ ...state, version: APP_VERSION }));
  } catch {}
}

const WDAYS  = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

// TO ADD A SUBJECT: just add a new entry here. Existing rev entries are safe.

const XP_VALUES = {
  water500:10, yoga:20, posture:10, workout:30,

  { name:"Franky", emoji:"🤖",  xp:2800, color:"#3b82f6", role:"Shipwright"  },
];

// ── ALL habit keys (used to compute daily score) ──────────────────────────
// TO ADD A NEW HABIT: add its key here + add its CheckItem in TodayPage
const ALL_HABITS = [
  "water500","yoga","posture","workout","left-8am","study-ontime",
  "water3l","nojunk","nosugar","protein","skincare","sunscreen",
  "sleep1130","noscreen_am","noscreen_pm","journaled",
];

// ═══════════════════════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════════════════════
function today()          { const d = new Date(); d.setHours(0,0,0,0); return d; }
function addDays(d, n)    { const r = new Date(d); r.setDate(r.getDate()+n); return r; }
function dkey(d)          { return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`; }
function dayNum(d)        { return Math.round((d - START) / 86400000); }
function isWorkoutDay(d)  { return [2,4,6].includes(d.getDay()); }
function fmtDate(d)       { return `${WDAYS[d.getDay()]}, ${d.getDate()} ${MONTHS[d.getMonth()]}`; }
function fmtShort(d)      { return `${d.getDate()} ${MONTHS[d.getMonth()]}`; }
function fromKey(k)       { const [y,m,d] = k.split("-").map(Number); return new Date(y,m,d); }
function getRank(xp)      { for (let i=RANKS.length-1;i>=0;i--) if(xp>=RANKS[i].min) return RANKS[i]; return RANKS[0]; }
function getNextRank(xp)  { return RANKS.find(r => r.min > xp) || null; }

function calcXP(days, revs) {
  let xp = 0;
  Object.values(days).forEach(dd =>
    Object.entries(dd?.checks||{}).forEach(([k,v]) => { if(v && XP_VALUES[k]) xp += XP_VALUES[k]; })
  );
  (revs||[]).forEach(e => {
    if (e.d1done) xp += 20;
    if (e.d4done) xp += 30;
    if (e.d7done) xp += 50;
  });
  return xp;
}

function getScore(dd) {
  const done = ALL_HABITS.filter(k => dd?.checks?.[k]).length;
  return { done, total: ALL_HABITS.length, pct: Math.round(done / ALL_HABITS.length * 100) };
}

.rev-entry{background:var(--card);border:2px solid var(--border);border-radius:8px;padding:11px 12px;margin-bottom:4px;display:flex;align-items:flex-start;gap:9px}
.re-info{flex:1;min-width:0}
.re-top{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:4px}
.re-subj{font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:2px 7px;border-radius:3px;color:white;font-weight:600}
.re-type{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
.re-type.d1{color:var(--green)} .re-type.d4{color:var(--blue)} .re-type.d7{color:var(--gold)}
.re-text{font-size:12px;color:var(--ink);margin-bottom:2px;word-break:break-word}
.re-meta{font-size:10px;color:var(--muted)}
.re-xp{font-size:9px;color:#ffd700;font-weight:700}
.re-actions{display:flex;flex-direction:column;gap:5px;flex-shrink:0}
.check-btn{width:22px;height:22px;border-radius:5px;border:1.5px solid var(--border);background:white;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .15s}
.check-btn.done{background:#22c55e;border-color:#22c55e;color:white}
.del-btn{width:20px;height:20px;border:none;background:none;color:var(--muted);cursor:pointer;font-size:16px;line-height:1}
.del-btn:hover{color:var(--red)}
.empty-msg{padding:13px;background:var(--card2);border-radius:7px;font-size:12px;color:var(--muted);text-align:center;margin-bottom:6px}

/* ── Review ── */
.review-card{background:var(--card);border:2px solid var(--border);border-radius:8px;padding:13px;margin-bottom:8px}
.review-q{font-size:12px;font-weight:600;color:var(--ink);margin:9px 0 4px}
.review-q:first-child{margin-top:0}
.review-ans{width:100%;background:var(--card2);border:1.5px solid var(--border);border-radius:5px;padding:8px 10px;color:var(--ink);font-size:12px;resize:none;outline:none;min-height:55px;font-family:'DM Sans',sans-serif}
.review-ans:focus{border-color:var(--gold)}
.review-stat{display:flex;justify-content:space-between;align-items:center;padding:7px 10px;background:var(--card2);border-radius:5px;margin-bottom:3px}
.review-stat-l{font-size:12px;color:var(--muted)}
.review-stat-v{font-family:'Pirata One',serif;font-size:16px;color:var(--red)}

/* ── Pirate code ── */
.code-card{display:flex;gap:11px;background:var(--card);border:2px solid var(--border);border-radius:7px;padding:10px 12px;margin-bottom:4px}
.code-em{font-size:18px;flex-shrink:0}
.code-title{font-size:12px;font-weight:600;color:var(--navy);margin-bottom:1px}
.code-sub{font-size:11px;color:var(--muted)}

/* ── Swipe hint dots ── */
.swipe-dots{display:flex;justify-content:center;gap:6px;padding:6px 0 4px;flex-shrink:0;background:var(--bg)}
.dot{width:6px;height:6px;border-radius:50%;background:var(--border);transition:all .2s;cursor:pointer}
.dot.active{background:var(--red);width:18px;border-radius:3px}

/* ── Toast ── */
.toast{position:fixed;top:68px;left:50%;transform:translateX(-50%);background:var(--navy);border:2px solid #ffd700;border-radius:7px;padding:9px 18px;color:#ffd700;font-family:'Pirata One',serif;font-size:15px;z-index:999;pointer-events:none;animation:toastIn .3s ease;white-space:nowrap}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:#00000099;display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
.modal-box{background:var(--card2);border:2.5px solid #ffd700;border-radius:12px;padding:20px;width:100%;max-width:360px;text-align:center;box-shadow:5px 5px 0 var(--gold)}
.modal-em{font-size:44px;animation:bounce 1s ease infinite alternate;display:block;margin-bottom:6px}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-7px)}}
.modal-title{font-family:'Pirata One',serif;font-size:24px;color:var(--red);margin-bottom:4px}
.modal-sub{font-family:'Pirata One',serif;font-size:16px;color:var(--navy);margin-bottom:10px}
.modal-body{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:14px}
.modal-ok{width:100%;padding:11px;border:none;border-radius:7px;background:var(--red);color:white;font-family:'Pirata One',serif;font-size:16px;cursor:pointer}
.modal-btns{display:flex;gap:8px;margin-top:12px}
.modal-btn{flex:1;padding:10px;border:none;border-radius:6px;font-family:'Pirata One',serif;font-size:13px;cursor:pointer}
.modal-btn.danger{background:var(--red);color:white}
.modal-btn.cancel{background:var(--card2);color:var(--muted);border:1.5px solid var(--border)}
`;

function Toast({ msg, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 1800); return () => clearTimeout(t); }, []);
  return <div className="toast">{msg}</div>;
}

function LevelUpModal({ rank, onClose }) {
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" onClick={e => e.stopPropagation()}>
        <span className="modal-em">{rank.emoji}</span>
        <div className="modal-title">RANK UP!!</div>
        <div className="modal-sub">{rank.name}</div>
        <div className="modal-body">Bounty: <strong>{rank.bounty} Berries</strong><br/>The World Government trembles!</div>
        <button className="modal-ok" onClick={onClose}>YOSH! LET'S GO! 🏴‍☠️</button>
      </div>
    </div>
  );
}

function CheckItem({ checked, label, xp, onClick }) {
  return (
    <div className={`ci${checked ? " done" : ""}`} onClick={onClick}>
      <div className="ci-box">{checked && "✓"}</div>
      <span className="ci-text">{label}</span>
      {xp && <span className="ci-xp">+{xp}XP</span>}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
//  SWIPE TABS WRAPPER
// ═══════════════════════════════════════════════════════════════════════════
function SwipeTabs({ tabIndex, setTabIndex, children }) {
  const trackRef   = useRef(null);
  const startXRef  = useRef(null);
  const startYRef  = useRef(null);
  const lockRef    = useRef(null); // "horiz" | "vert" | null

  const goTo = useCallback((i) => {
    setTabIndex(Math.max(0, Math.min(TAB_IDS.length - 1, i)));
  }, [setTabIndex]);

  const onTouchStart = useCallback((e) => {
    startXRef.current = e.touches[0].clientX;
    startYRef.current = e.touches[0].clientY;
    lockRef.current   = null;
  }, []);

  const onTouchMove = useCallback((e) => {
    if (!startXRef.current) return;
    const dx = e.touches[0].clientX - startXRef.current;
    const dy = e.touches[0].clientY - startYRef.current;

    // Lock direction on first significant move
    if (!lockRef.current && (Math.abs(dx) > 8 || Math.abs(dy) > 8)) {
      lockRef.current = Math.abs(dx) > Math.abs(dy) ? "horiz" : "vert";
    }

    // Only prevent default & move if horizontal swipe
    if (lockRef.current === "horiz") {
      e.preventDefault();
    }
  }, []);

  const onTouchEnd = useCallback((e) => {
    if (lockRef.current !== "horiz" || !startXRef.current) { startXRef.current = null; return; }
    const dx = e.changedTouches[0].clientX - startXRef.current;
    if (Math.abs(dx) > 50) {
      if (dx < 0) goTo(tabIndex + 1);
      else         goTo(tabIndex - 1);
    }
    startXRef.current = null;
    lockRef.current   = null;
  }, [tabIndex, goTo]);

  useEffect(() => {
    const el = trackRef.current;
    if (!el) return;
    el.addEventListener("touchmove", onTouchMove, { passive: false });
    return () => el.removeEventListener("touchmove", onTouchMove);
  }, [onTouchMove]);

  return (
    <div className="swipe-container"
      ref={trackRef}
      onTouchStart={onTouchStart}
      onTouchEnd={onTouchEnd}>
      <div className="swipe-track"
        style={{ transform: `translateX(-${tabIndex * 100}%)` }}>
        {children}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
//  MAIN APP
// ═══════════════════════════════════════════════════════════════════════════
function App() {
  const [state,   setState]   = useState(null); // null = loading
  const [tabIdx,  setTabIdx]  = useState(0);
  const [toast,   setToast]   = useState(null);
  const [levelUp, setLevelUp] = useState(null);
  const [delId,   setDelId]   = useState(null);
  const [viewDate, setViewDate] = useState(() => today());

  // Revision form state
  const [revSubj, setRevSubj] = useState("Pharmacology");
  const [revText, setRevText] = useState("");
  const [revDateStr, setRevDateStr] = useState(() => {
    const d = today();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  });

  const saveTimer = useRef(null);
  const prevXP    = useRef(0);

  // ── Load ──────────────────────────────────────────────────────────────
  useEffect(() => {
    loadData().then(s => {
      setState(s);
      prevXP.current = calcXP(s.days, s.revs);
    });
  }, []);

  // ── Persist (debounced) ───────────────────────────────────────────────
  const persist = useCallback((s) => {
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => saveData(s), 500);
  }, []);

  // ── Rank-up check ─────────────────────────────────────────────────────
  const checkRankUp = useCallback((newState) => {
    const newXP = calcXP(newState.days, newState.revs);
    const gained = newXP - prevXP.current;
    const oldRank = getRank(prevXP.current);
    const newRank = getRank(newXP);
    if (gained > 0) setToast(`+${gained} XP ⚡`);
    if (newRank.name !== oldRank.name && newXP > prevXP.current) {
      setTimeout(() => setLevelUp(newRank), 700);
    }
    prevXP.current = newXP;
  }, []);

  // ── Updater helper ────────────────────────────────────────────────────
  const update = useCallback((fn) => {
    setState(prev => {
      const next = fn(prev);
      persist(next);
      checkRankUp(next);
      return next;
    });
  }, [persist, checkRankUp]);

  // ── Actions ───────────────────────────────────────────────────────────
  const toggleCheck = useCallback((dateKey, id) => {
    update(s => {
      const dd = s.days[dateKey] || {};
      const checks = { ...(dd.checks || {}), [id]: !(dd.checks?.[id]) };
      return { ...s, days: { ...s.days, [dateKey]: { ...dd, checks } } };
    });
  }, [update]);

  const setDayField = useCallback((dateKey, field, val) => {
    update(s => ({
      ...s,
      days: { ...s.days, [dateKey]: { ...(s.days[dateKey] || {}), [field]: val } }
    }));
  }, [update]);

  const addRevision = useCallback(() => {
    if (!revText.trim()) return;
    const [y,m,d] = revDateStr.split("-").map(Number);
    const sd = new Date(y, m-1, d); sd.setHours(0,0,0,0);
    const entry = {
      id: state.nid, text: revText.trim(), subject: revSubj,
      studyDate: dkey(sd), rev1Date: dkey(addDays(sd,3)), rev2Date: dkey(addDays(sd,6)),
      d1done: false, d4done: false, d7done: false, addedAt: Date.now(),
    };
    update(s => ({ ...s, revs: [...s.revs, entry], nid: s.nid + 1 }));
    setRevText("");
    setToast("🍎 Devil Fruit awakened! +20 XP");
  }, [revText, revSubj, revDateStr, state, update]);

  const toggleRev = useCallback((id, field) => {
    update(s => ({
      ...s,
      revs: s.revs.map(e => e.id === id ? { ...e, [field]: !e[field] } : e)
    }));
  }, [update]);

  const deleteRev = useCallback((id) => {
    update(s => ({ ...s, revs: s.revs.filter(e => e.id !== id) }));
    setDelId(null);
  }, [update]);

  const setReview = useCallback((rkey, qkey, val) => {
    update(s => ({
      ...s,
      rvws: { ...s.rvws, [rkey]: { ...(s.rvws[rkey] || {}), [qkey]: val } }
    }));
  }, [update]);

  // ── Tab nav (sync tabs bar + swipe) ──────────────────────────────────
  const goToTab = useCallback((i) => {
    setTabIdx(i);
    // Scroll tab into view
    const tabEl = document.getElementById(`tab-${TAB_IDS[i]}`);
    tabEl?.scrollIntoView({ behavior:"smooth", block:"nearest", inline:"center" });
  }, []);

  // ── Loading ───────────────────────────────────────────────────────────
  if (!state) return (
    <>
      <style>{STYLES}</style>
      <div className="app" style={{alignItems:"center",justifyContent:"center",background:"var(--navy)"}}>
        <span style={{fontSize:"52px",marginBottom:"12px"}}>🏴‍☠️</span>
        <div style={{fontFamily:"'Pirata One',serif",fontSize:"20px",color:"#ffd700"}}>Setting Sail…</div>
        <div style={{fontSize:"11px",color:"#94a3b8",marginTop:"8px"}}>Loading your saved voyage data</div>
      </div>
    </>
  );

  // ── Derived ───────────────────────────────────────────────────────────
  const xp       = calcXP(state.days, state.revs);
  const rank     = getRank(xp);
  const nextRank = getNextRank(xp);
  const xpPct    = nextRank ? (xp - rank.min) / (nextRank.min - rank.min) * 100 : 100;
  const todayKey = dkey(today());
  const revPending = state.revs.filter(e =>
    (e.studyDate === todayKey && !e.d1done) ||
    (e.rev1Date  === todayKey && !e.d4done) ||
    (e.rev2Date  === todayKey && !e.d7done)
  ).length;

  const TABS = [
    { id:"today",   label:"📅 Today"   },
    { id:"tracker", label:"📊 Tracker"  },
    { id:"rev",     label:`🔁 1·4·7${revPending > 0 ? ` (${revPending})` : ""}` },
    { id:"review",  label:"📋 Review"   },
    { id:"log",     label:"🏴‍☠️ Log"    },
  ];

  const sharedProps = {
    state, todayKey, toggleCheck, setDayField, toggleRev, setDelId, setReview,
  };

  return (
    <>
      <style>{STYLES}</style>
      <div className="app">

        {/* Header */}
        <div className="hdr">
          <div>
            <div className="hdr-title">JARVIS 30-DAY</div>
            <div className="hdr-sub">
              April 2026 · {dayNum(today()) >= 0 && dayNum(today()) < 30
                ? `Day ${dayNum(today())+1}/30` : "Voyage"}
            </div>
          </div>
          <div className="hdr-badge">
            <div className="hdr-badge-label">Bounty</div>
            <div className="hdr-badge-val">{rank.bounty}฿</div>
          </div>
        </div>

        {/* Tab bar */}
        <div className="tabs">
          {TABS.map((t, i) => (
            <button key={t.id} id={`tab-${t.id}`}
              className={`tab${tabIdx === i ? " active" : ""}`}
              onClick={() => goToTab(i)}>
              {t.label}
            </button>
          ))}
        </div>

        {/* Swipeable pages */}
        <SwipeTabs tabIndex={tabIdx} setTabIndex={goToTab}>
          <div className="swipe-page"><div className="pad">
            <TodayPage {...sharedProps} viewDate={viewDate} setViewDate={setViewDate}/>
          </div></div>
          <div className="swipe-page"><div className="pad">
            <TrackerPage state={state}/>
          </div></div>
          <div className="swipe-page"><div className="pad">
            <RevisionPage {...sharedProps}
              revSubj={revSubj} setRevSubj={setRevSubj}
              revText={revText} setRevText={setRevText}
              revDateStr={revDateStr} setRevDateStr={setRevDateStr}
              onAdd={addRevision}/>
          </div></div>
          <div className="swipe-page"><div className="pad">
            <ReviewPage {...sharedProps}/>
          </div></div>
          <div className="swipe-page"><div className="pad">
            <LogPage xp={xp} rank={rank} nextRank={nextRank} xpPct={xpPct} state={state}/>
          </div></div>
        </SwipeTabs>

        {/* Dot indicators */}
        <div className="swipe-dots">
          {TABS.map((_, i) => (
            <div key={i} className={`dot${tabIdx === i ? " active" : ""}`} onClick={() => goToTab(i)}/>
          ))}
        </div>

      </div>

      {toast  && <Toast msg={toast} onDone={() => setToast(null)}/>}
      {levelUp && <LevelUpModal rank={levelUp} onClose={() => setLevelUp(null)}/>}
      {delId   && (
        <div className="modal-overlay" onClick={() => setDelId(null)}>
          <div className="modal-box" onClick={e => e.stopPropagation()}>
            <span className="modal-em">⚠️</span>
            <div className="modal-title">Abandon Ability?</div>
            <div className="modal-body">Removes this topic and all 3 scheduled revisions.</div>
            <div className="modal-btns">
              <button className="modal-btn cancel" onClick={() => setDelId(null)}>Cancel</button>
              <button className="modal-btn danger" onClick={() => deleteRev(delId)}>Delete</button>
            </div>
          </div>
        </div>
      )}
    </>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
//  TODAY PAGE
// ═══════════════════════════════════════════════════════════════════════════
function TodayPage({ state, viewDate, setViewDate, toggleCheck, setDayField, toggleRev, setDelId }) {
  const key    = dkey(viewDate);
  const dd     = state.days[key] || {};
  const ch     = dd.checks || {};
  const dn     = dayNum(viewDate);
  const wo     = isWorkoutDay(viewDate);
  const isToday = dkey(viewDate) === dkey(today());

  const c = id => ch[id] || false;
  const t = id => toggleCheck(key, id);

  const { done, total, pct } = getScore(dd);
  const morningDone = [c("water500"), c("yoga"), c("posture"), wo ? c("workout") : true, c("left-8am")].filter(Boolean).length;
  const morningTotal = 5;

  const revToday = state.revs.filter(e =>
    e.studyDate === key || e.rev1Date === key || e.rev2Date === key
  );

  return (
    <>
      <div className="date-nav">
        <button className="date-nav-btn" disabled={dn <= 0}  onClick={() => setViewDate(d => addDays(d,-1))}>← Prev</button>
        <div className="date-nav-center">
          <div className="date-nav-label">{fmtDate(viewDate)}{isToday ? " 🔴" : ""}</div>
          <div className="date-nav-sub">Day {dn+1} / 30 · {pct}% complete</div>
        </div>
        <button className="date-nav-btn" disabled={dn >= 29} onClick={() => setViewDate(d => addDays(d,1))}>Next →</button>
      </div>

      {/* Morning */}
      <div className="section-card gr">
        <div className="section-title">
          <span>🌅</span><span style={{color:"var(--green)"}}>Morning Routine</span>
          <div className="prog-mini">
            <div className="prog-mini-fill" style={{width:`${morningDone/morningTotal*100}%`,background:"var(--green)"}}/>
          </div>
        </div>
        <CheckItem checked={c("water500")} label="💧 500ml water on waking"             xp={10} onClick={() => t("water500")}/>
        <CheckItem checked={c("yoga")}     label="🌊 Yoga 20 min (Adriene)"             xp={20} onClick={() => t("yoga")}/>
        <CheckItem checked={c("posture")}  label="🧘 Posture routine 8–10 min"          xp={10} onClick={() => t("posture")}/>
        {wo
          ? <CheckItem checked={c("workout")} label="⚔️ Haki Training — 25 min workout" xp={30} onClick={() => t("workout")}/>
          : <div className="ci" style={{opacity:.5}}><div className="ci-box"/><span className="ci-text">⚓ Rest day — no workout</span></div>
        }
        <CheckItem checked={c("left-8am")} label="🏃 Reached library by 8 AM"          xp={20} onClick={() => t("left-8am")}/>
        <textarea className="notes-inp" rows={2} placeholder="Morning notes…"
          value={dd.morningNotes||""} onChange={e => setDayField(key,"morningNotes",e.target.value)}/>
      </div>

      {/* Study */}
      <div className="section-card op">
        <div className="section-title"><span>⚔️</span><span style={{color:"var(--red)"}}>Study Log — One Piece</span></div>
        <CheckItem checked={c("study-ontime")} label="📖 Started studying by 8 AM" xp={25} onClick={() => t("study-ontime")}/>
        <div className="study-row">
          <span className="study-label">⏰ Study start time</span>
          <input className="study-input" placeholder="7:58 AM"
            value={dd.studyStart||""} onChange={e => setDayField(key,"studyStart",e.target.value)}/>
        </div>
        <div className="study-row">
          <span className="study-label">📚 Total hours studied</span>
          <input className="study-input" placeholder="e.g. 8.5"
            value={dd.studyHours||""} onChange={e => setDayField(key,"studyHours",e.target.value)}/>
        </div>
        <div className="study-row">
          <span className="study-label">🗺️ Topics covered</span>
          <input className="study-input" style={{width:"130px"}} placeholder="Pharma Ch4…"
            value={dd.topics||""} onChange={e => setDayField(key,"topics",e.target.value)}/>
        </div>
        {revToday.length > 0 && (
          <>
            <div className="sec-label" style={{color:"var(--red)"}}>🔁 Revisions due today</div>
            {revToday.map(e => {
              const isD7  = e.rev2Date === key;
              const isD4  = e.rev1Date === key;
              const type  = isD7 ? "d7" : isD4 ? "d4" : "d1";
              const field = isD7 ? "d7done" : isD4 ? "d4done" : "d1done";
              const isDone = e[field];
              const label  = isD7 ? "⚡ Day 7 Mastery" : isD4 ? "🔁 Day 4 Revision" : "📖 Day 1 Study";
              const S = SUBJECTS[e.subject] || SUBJECTS["Other"];
              return (
                <div key={`${e.id}-${type}`} className="rev-entry" style={{marginBottom:"4px"}}>
                  <div className="re-info">
                    <div className="re-top">
                      <span className="re-subj" style={{background:S.color}}>{S.em} {e.subject}</span>
                      <span className={`re-type ${type}`}>{label}</span>
                    </div>
                    <div className="re-text">{e.text}</div>
                  </div>
                  <div className="re-actions">
                    <button className={`check-btn${isDone?" done":""}`} onClick={() => toggleRev(e.id, field)}>{isDone&&"✓"}</button>
                    <button className="del-btn" onClick={() => setDelId(e.id)}>×</button>
                  </div>
                </div>
              );
            })}
          </>

// ═══════════════════════════════════════════════════════════════════════════
//  TRACKER PAGE
// ═══════════════════════════════════════════════════════════════════════════
function TrackerPage({ state }) {
  const TODAY   = today();
  const scores  = Array.from({length:30}, (_,i) => getScore(state.days[dkey(addDays(START,i))] || {}));
  const elapsed = Math.max(1, Array.from({length:30},(_,i)=>addDays(START,i)).filter(d=>d<=TODAY).length);
  const avg     = Math.round(scores.slice(0,elapsed).reduce((a,s)=>a+s.pct,0) / elapsed);
  const perfect = scores.filter((s,i) => addDays(START,i) <= TODAY && s.pct===100).length;

  let streak=0, sd=new Date(TODAY);
  while (sd >= START) {
    const { pct } = getScore(state.days[dkey(sd)] || {});
    if (pct === 100) { streak++; sd.setDate(sd.getDate()-1); }
    else break;
  }

  const bars = [
    ["💧 Water 500ml","water500","var(--green)"],["🌊 Yoga","yoga","var(--green)"],
    ["⚔️ Workout","workout","var(--red)"],["📖 Study on time","study-ontime","var(--red)"],
    ["💧 Water 3L","water3l","var(--hk)"],["🥦 No junk","nojunk","var(--hk)"],
    ["✨ Skincare","skincare","var(--hk)"],["🌙 Sleep 11:30","sleep1130","var(--blue)"],
    ["📵 No screen AM","noscreen_am","var(--purple)"],["📝 Journaled","journaled","var(--orange)"],
  ];

  return (
    <>
      <div className="stats-row">
        <div className="stat-cell"><div className="stat-val">{streak}</div><div className="stat-lbl">🔥 Streak</div></div>
        <div className="stat-cell"><div className="stat-val">{avg}%</div><div className="stat-lbl">📊 Avg Score</div></div>
        <div className="stat-cell"><div className="stat-val">{perfect}</div><div className="stat-lbl">⭐ Perfect Days</div></div>
      </div>
      <div className="sec-label" style={{color:"var(--red)"}}>📊 30-Day Grand Line Map</div>
      <div className="grid-30">
        {Array.from({length:30},(_,i) => {
          const date = addDays(START,i);
          const isT  = dkey(date)===dkey(TODAY), isF = date>TODAY;
          const {pct} = scores[i];
          const cls = isT?"gc-today":isF?"gc-future":pct===100?"gc-full":pct>0?"gc-partial":"gc-missed";
          return (
            <div key={i} className={`gc ${cls}`}>
              {date.getDate()}
              {!isF && !isT && <span className="gc-score">{pct}%</span>}
            </div>
          );
        })}
      </div>
      <div className="legend">
        <div className="legend-item"><div className="legend-dot" style={{background:"#22c55e"}}/>100%</div>
        <div className="legend-item"><div className="legend-dot" style={{background:"#fef3c7",border:"1px solid var(--gold)"}}/>Partial</div>
        <div className="legend-item"><div className="legend-dot" style={{background:"#fef2f2",border:"1px solid #fca5a5"}}/>Missed</div>
        <div className="legend-item"><div className="legend-dot" style={{background:"#f5f5f0"}}/>Upcoming</div>
      </div>
      <div className="sec-label" style={{color:"var(--hk)",marginTop:"16px"}}>🏐 Habit Consistency</div>
      {bars.map(([lbl,id,col]) => {
        const done = Array.from({length:30},(_,i)=>addDays(START,i)).filter(d=>d<=TODAY&&state.days[dkey(d)]?.checks?.[id]).length;
        const pct  = Math.round(done/elapsed*100);
        return (
          <div key={id} className="habit-bar-row">
            <div className="habit-bar-top"><span>{lbl}</span><span style={{color:col,fontWeight:"600"}}>{done}/{elapsed}d</span></div>
            <div className="habit-bar-track"><div className="habit-bar-fill" style={{width:`${pct}%`,background:col}}/></div>
          </div>
        );
      })}
      <div style={{height:"16px"}}/>
    </>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
//  REVISION PAGE
// ═══════════════════════════════════════════════════════════════════════════
function RevisionPage({ state, revSubj, setRevSubj, revText, setRevText, revDateStr, setRevDateStr, onAdd, toggleRev, setDelId }) {
  const [filter, setFilter] = useState("Today");
  const tk = dkey(today());
  const mastered = state.revs.filter(e => e.d1done && e.d4done && e.d7done).length;

  const items = (() => {
    if (filter === "Today") return state.revs.flatMap(e => {
      const out = [];
      if (e.studyDate===tk) out.push({e,type:"d1",field:"d1done",isDone:e.d1done,label:"📖 Day 1 — Awakening"});
      if (e.rev1Date===tk)  out.push({e,type:"d4",field:"d4done",isDone:e.d4done,label:"🔁 Day 4 — Training"});
      if (e.rev2Date===tk)  out.push({e,type:"d7",field:"d7done",isDone:e.d7done,label:"⚡ Day 7 — Mastered"});
      return out;
    });
    if (filter === "All") return state.revs.flatMap(e => [
      {e,type:"d1",field:"d1done",isDone:e.d1done,label:"📖 D1"},
      {e,type:"d4",field:"d4done",isDone:e.d4done,label:"🔁 D4"},
      {e,type:"d7",field:"d7done",isDone:e.d7done,label:"⚡ D7"},
    ]);
    return state.revs.filter(e=>e.subject===filter).flatMap(e=>[
      {e,type:"d1",field:"d1done",isDone:e.d1done,label:"📖 D1"},
      {e,type:"d4",field:"d4done",isDone:e.d4done,label:"🔁 D4"},
      {e,type:"d7",field:"d7done",isDone:e.d7done,label:"⚡ D7"},
    ]);
  })();

  return (
    <>
      <div className="th op">
        <div className="th-title">🍎 Devil Fruit Mastery</div>
        <div className="th-sub">1·4·7 · {state.revs.length} topics · {mastered} mastered · {Object.keys(SUBJECTS).length} subjects</div>
      </div>

      {/* Add form */}
      <div className="rev-form">
        <div className="rev-title">+ Awaken New Ability</div>
        <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"8px"}}>
          <span style={{fontSize:"12px",color:"var(--muted)",whiteSpace:"nowrap"}}>Study date:</span>
          <input type="date" className="date-inp" value={revDateStr} onChange={e=>setRevDateStr(e.target.value)}/>
        </div>
        <div className="filter-grid">
          {Object.entries(SUBJECTS).map(([name,s]) => (
            <button key={name}
              className={`filter-btn${revSubj===name?" active":""}`}
              style={revSubj===name?{background:s.color,borderColor:s.color}:{}}
              onClick={()=>setRevSubj(name)}>
              {s.em} {name}
            </button>
          ))}
        </div>
        <input className="text-inp" placeholder="e.g. Beta blockers — mechanism, uses, side effects"
          value={revText} onChange={e=>setRevText(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&onAdd()}/>
        <button className="add-btn" disabled={!revText.trim()} onClick={onAdd}>
          ADD — AUTO-SCHEDULES DAY 1 · 4 · 7
        </button>
      </div>

      {/* Filter bar */}
      <div className="filter-grid">
        {["Today","All",...Object.keys(SUBJECTS).filter(s=>state.revs.some(e=>e.subject===s))].map(f => {
          const S = SUBJECTS[f];
          return (
            <button key={f} className={`filter-btn${filter===f?" active":""}`}
              style={filter===f?{background:S?.color||"var(--red)",borderColor:S?.color||"var(--red)"}:{}}
              onClick={()=>setFilter(f)}>{f}
            </button>
          );
        })}
      </div>

      {items.length === 0 && (
        <div className="empty-msg">
          {filter==="Today" ? "No revisions due today — add a new topic above ↑" : "No topics yet for this subject."}
        </div>
      )}

      {items.map(({e,type,field,isDone,label}) => {
        const S = SUBJECTS[e.subject] || SUBJECTS["Other"];
        const xpVal = type==="d7"?50:type==="d4"?30:20;
        return (
          <div key={`${e.id}-${type}`} className="rev-entry">
            <div className="re-info">
              <div className="re-top">
                <span className="re-subj" style={{background:S.color}}>{S.em} {e.subject}</span>
                <span className={`re-type ${type}`}>{label}</span>
              </div>
              <div className="re-text">{e.text}</div>
              {type!=="d1" && <div className="re-meta">Studied: {fmtShort(fromKey(e.studyDate))}</div>}
              <div className="re-xp">+{xpVal} Berries on complete</div>
            </div>
            <div className="re-actions">
              <button className={`check-btn${isDone?" done":""}`} onClick={()=>toggleRev(e.id,field)}>{isDone&&"✓"}</button>
              <button className="del-btn" onClick={()=>setDelId(e.id)}>×</button>
            </div>
          </div>
        );
      })}
      <div style={{height:"16px"}}/>
    </>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
//  REVIEW PAGE
// ═══════════════════════════════════════════════════════════════════════════
function ReviewPage({ state, todayKey, setReview }) {
  const [type, setType] = useState("daily");
  const TODAY   = today();
  const elapsed = Math.max(1,Array.from({length:30},(_,i)=>addDays(START,i)).filter(d=>d<=TODAY).length);
  const scores  = Array.from({length:30},(_,i)=>getScore(state.days[dkey(addDays(START,i))]||{}));
  const avg     = Math.round(scores.slice(0,elapsed).reduce((a,s)=>a+s.pct,0)/elapsed);
  const mastered = state.revs.filter(e=>e.d1done&&e.d4done&&e.d7done).length;
  const dd = state.days[todayKey] || {};

  const RQ = ({qKey,label,rkey}) => (
    <div>
      <div className="review-q">{label}</div>
      <textarea className="review-ans" rows={3} placeholder="Write here…"
        value={state.rvws[rkey]?.[qKey]||""}
        onChange={e => setReview(rkey,qKey,e.target.value)}/>
    </div>
  );
  const RS = ({label,value}) => (
    <div className="review-stat">
      <span className="review-stat-l">{label}</span>
      <span className="review-stat-v">{value}</span>
    </div>
  );

  return (
    <>
      <div className="filter-grid" style={{marginBottom:"12px"}}>
        {["daily","weekly","15-day","30-day"].map(t => (
          <button key={t} className={`filter-btn${type===t?" active":""}`}
            style={type===t?{background:"var(--teal)",borderColor:"var(--teal)"}:{}}
            onClick={()=>setType(t)}>
            {t.charAt(0).toUpperCase()+t.slice(1)}
          </button>
        ))}
      </div>

      {type==="daily" && (
        <div className="review-card">
          <div style={{fontFamily:"'Pirata One',serif",fontSize:"16px",color:"var(--red)",marginBottom:"10px"}}>
            ⚔️ Battle Report — {fmtDate(TODAY)}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"5px",marginBottom:"10px"}}>
            <RS label="📊 Score"  value={`${getScore(dd).pct}%`}/>
            <RS label="⏰ Start"  value={dd.studyStart||"—"}/>
            <RS label="📚 Hours"  value={dd.studyHours||"—"}/>
            <RS label="😊 Mood"   value={`${dd.mood||5}/10`}/>
          </div>
          <RQ qKey="win"       label="⚔️ What did I conquer today?"    rkey={`d-${todayKey}`}/>
          <RQ qKey="hard"      label="🌊 What was hard?"               rkey={`d-${todayKey}`}/>
          <RQ qKey="grateful"  label="🍃 One thing I'm grateful for:"  rkey={`d-${todayKey}`}/>
          <RQ qKey="tomorrow"  label="🎯 Tomorrow I will…"             rkey={`d-${todayKey}`}/>
        </div>
      )}

      {type==="weekly" && [1,2,3,4].map(w => (
        <div key={w} className="review-card">
          <div style={{fontFamily:"'Pirata One',serif",fontSize:"15px",color:"var(--teal)",marginBottom:"10px"}}>
            📆 Week {w} — {fmtShort(addDays(START,(w-1)*7))} to {fmtShort(addDays(START,w*7-1))}
          </div>
          {(()=>{
            const wd  = Array.from({length:7},(_,i)=>addDays(START,(w-1)*7+i));
            const wa  = Math.round(wd.reduce((a,d)=>a+getScore(state.days[dkey(d)]||{}).pct,0)/7);
            const wt  = wd.filter(d=>state.days[dkey(d)]?.checks?.["study-ontime"]).length;
            const ww  = wd.filter(d=>state.days[dkey(d)]?.checks?.["workout"]).length;
            return (
              <>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"4px",marginBottom:"10px"}}>
                  <RS label="📊 Avg"      value={`${wa}%`}/>
                  <RS label="⏰ On-time"  value={`${wt}/7`}/>
                  <RS label="⚔️ Workouts" value={`${ww}/3`}/>
                  <RS label="🍎 Topics"   value={`${state.revs.length}`}/>
                </div>
                <RQ qKey="best"   label="What went best?"          rkey={`w-${w}`}/>
                <RQ qKey="change" label="What needs to change?"    rkey={`w-${w}`}/>
                <RQ qKey="goal"   label="Next week's one goal:"    rkey={`w-${w}`}/>
              </>
            );
          })()}
        </div>
      ))}

      {type==="15-day" && (
        <div className="review-card">
          <div style={{fontFamily:"'Pirata One',serif",fontSize:"15px",color:"var(--purple)",marginBottom:"10px"}}>
            🌗 15-Day Halfway Review
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"4px",marginBottom:"10px"}}>
            <RS label="📊 Avg Score" value={`${avg}%`}/>
            <RS label="⏰ On-time"   value={`${Array.from({length:15},(_,i)=>addDays(START,i)).filter(d=>state.days[dkey(d)]?.checks?.["study-ontime"]).length}/15`}/>
            <RS label="⚔️ Workouts"  value={`${Array.from({length:15},(_,i)=>addDays(START,i)).filter(d=>state.days[dkey(d)]?.checks?.["workout"]).length}`}/>
            <RS label="🍎 Topics"    value={`${state.revs.length}`}/>
          </div>
          <RQ qKey="sticking" label="Best sticking habit?"         rkey="r15"/>
          <RQ qKey="broken"   label="Habit falling apart?"         rkey="r15"/>
          <RQ qKey="change"   label="Changes for second half?"     rkey="r15"/>
          <RQ qKey="targets"  label="Second-half targets:"         rkey="r15"/>
        </div>
      )}

      {type==="30-day" && (
        <div className="review-card">
          <div style={{fontFamily:"'Pirata One',serif",fontSize:"17px",color:"var(--red)",marginBottom:"10px"}}>
            🏴‍☠️ Month-End Reckoning — April 2026
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"4px",marginBottom:"10px"}}>
            <RS label="📊 Final Avg" value={`${avg}%`}/>
            <RS label="⭐ Perfect"   value={`${scores.filter((s,i)=>addDays(START,i)<=TODAY&&s.pct===100).length}d`}/>
            <RS label="🍎 Topics"    value={`${state.revs.length}`}/>
            <RS label="⚡ Mastered"  value={`${mastered}`}/>
          </div>
          <RQ qKey="proud"  label="⚔️ Most proud of this month?"          rkey="r30"/>
          <RQ qKey="neet"   label="📚 NEET prep — how did studying go?"   rkey="r30"/>
          <RQ qKey="body"   label="💪 Physical changes noticed?"          rkey="r30"/>
          <RQ qKey="mental" label="🍃 Mental health this month?"          rkey="r30"/>
          <RQ qKey="island" label="🗺️ What island did you conquer?"       rkey="r30"/>
          <RQ qKey="may"    label="🎯 What changes for May?"              rkey="r30"/>
        </div>
      )}
      <div style={{height:"16px"}}/>
    </>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
//  LOG PAGE
// ═══════════════════════════════════════════════════════════════════════════
function LogPage({ xp, rank, nextRank, xpPct, state }) {
  let streak=0, sd=new Date(today());
  while (sd >= START) {
    const { pct } = getScore(state.days[dkey(sd)] || {});
    if (pct === 100) { streak++; sd.setDate(sd.getDate()-1); }
    else break;
  }

  return (
    <>
      {/* Wanted poster */}
      <div className="wanted">
        <div className="wanted-tag">— WANTED —</div>
        <span className="wanted-emoji">🏴‍☠️</span>
        <div className="wanted-tag">MONKEY D. LUFFY</div>
        <div className="wanted-rank">{rank.name}</div>
        <div className="wanted-bounty">{rank.bounty}</div>
        <div className="wanted-berry">BERRIES</div>
        <div className="xp-wrap">
          <div className="xp-labels">
            <span>{xp} XP</span>
            <span>{nextRank ? `${nextRank.min-xp} XP to "${nextRank.name}"` : "MAX RANK 🏆"}</span>
          </div>
          <div className="xp-track"><div className="xp-fill" style={{width:`${Math.min(100,xpPct)}%`}}/></div>
        </div>
      </div>

      <div className="stats-row">
        <div className="stat-cell"><div className="stat-val">{streak}</div><div className="stat-lbl">🔥 Streak</div></div>
        <div className="stat-cell"><div className="stat-val">{xp}</div><div className="stat-lbl">⚡ Total XP</div></div>
        <div className="stat-cell"><div className="stat-val">{Math.max(0,dayNum(today())+1)}/30</div><div className="stat-lbl">⚓ Day</div></div>
      </div>

      <div className="sec-label" style={{color:"var(--red)"}}>Your Crew</div>
      <div className="crew-grid">
        {CREW.map(c => (
          <div key={c.name} className={`crew-card${xp>=c.xp?"":" locked"}`} style={xp>=c.xp?{borderColor:c.color}:{}}>
            <div className="crew-emoji">{c.emoji}</div>
            <div className="crew-name" style={xp>=c.xp?{color:c.color}:{}}>{c.name}</div>
            <div className="crew-role">{xp>=c.xp?c.role:`Unlocks at ${c.xp} XP`}</div>
          </div>
        ))}
      </div>

      <div className="sec-label" style={{color:"var(--red)"}}>⚓ Pirate Code</div>
      {[
        ["⚓","500ml water on waking","Before phone. Before anything."],
        ["🥩","Protein at every meal","Eggs, dal, sprouts — every meal."],
        ["🏝️","Post-lunch walk 10–15 min","Kills brain fog. Improves afternoon focus."],
        ["🧘","Never skip yoga + posture","10 min even on worst days."],
        ["🌙","Sleep by 11:30 PM","Fat loss + NEET memory consolidation."],
        ["📵","No screen first 2 hours","BDNF peaks — protect this window."],
      ].map(([em,title,sub]) => (
        <div key={title} className="code-card">
          <span className="code-em">{em}</span>
          <div><div className="code-title">{title}</div><div className="code-sub">{sub}</div></div>
        </div>
      ))}
      <div style={{height:"16px"}}/>
    </>
  );
}
