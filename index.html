<!-- React 18 — no Babel needed, pure JS -->
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script>

// ═══════════════════════════════════════════════
// JARVIS 30-DAY — Pure JS, No Babel Required
// Uses React.createElement directly
// ═══════════════════════════════════════════════
const { useState, useEffect, useCallback, useRef } = React;
const e = React.createElement;

// ── Storage (localStorage) ──────────────────────
const STORAGE_KEY = "jarvis-master";
const APP_VERSION = 2;

function freshState() {
  return { version: APP_VERSION, days: {}, revs: [], nid: 1, rvws: {} };
}

function migrate(raw) {
  if (!raw) return freshState();
  let data;
  try { data = typeof raw === "string" ? JSON.parse(raw) : raw; }
  catch { return freshState(); }
  if (!data.version) {
    data = { version:1, days:data.days||data.dayData||{}, revs:data.revs||data.entries||[], nid:data.nid||data.nextId||1, rvws:data.rvws||data.reviews||{} };
  }
  if (data.version < 2) {
    const sm = {"Physio":"Physiology","Pharma":"Pharmacology","Patho":"Pathology","Med":"Medicine","Biochem":"Biochemistry","Micro":"Microbiology"};
    data.revs = (data.revs||[]).map(e => ({...e, subject: sm[e.subject]||e.subject||"Other"}));
    data.version = 2;
  }
  return { version:APP_VERSION, days:data.days||{}, revs:data.revs||[], nid:data.nid||1, rvws:data.rvws||{} };
}

function loadData() {
  try { return migrate(localStorage.getItem(STORAGE_KEY)); }
  catch { return freshState(); }
}

function saveData(s) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({...s, version:APP_VERSION})); } catch{}
}

// ── Constants ───────────────────────────────────
const START = new Date(2026, 3, 1);
const MS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const WD = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

const SUBJECTS = {
  "Physiology":{c:"#f43f5e",em:"🫀"},"Pharmacology":{c:"#8b5cf6",em:"⚗️"},
  "Pathology":{c:"#334155",em:"🔬"},"Medicine":{c:"#0ea5e9",em:"⚕️"},
  "PSM":{c:"#10b981",em:"📊"},"Biochemistry":{c:"#f59e0b",em:"🧬"},
  "Microbiology":{c:"#84cc16",em:"🦠"},"Anatomy":{c:"#e11d48",em:"🦴"},
  "FMT":{c:"#0891b2",em:"⚖️"},"Ophthalmology":{c:"#f97316",em:"👁️"},
  "ENT":{c:"#7c3aed",em:"👂"},"Dermatology":{c:"#db2777",em:"🧴"},
  "Anaesthesia":{c:"#64748b",em:"💉"},"Radiology":{c:"#0284c7",em:"🔭"},
  "Psychiatry":{c:"#9333ea",em:"🧠"},"Orthopaedics":{c:"#b45309",em:"🦿"},
  "Paediatrics":{c:"#16a34a",em:"👶"},"OBG":{c:"#be185d",em:"🌸"},
  "Surgery":{c:"#dc2626",em:"🔪"},"Other":{c:"#6b7280",em:"📚"}
};

const RANKS = [
  {name:"East Blue Rookie",min:0,bounty:"0",emoji:"📖"},
  {name:"Pirate",min:200,bounty:"10M",emoji:"🏴‍☠️"},
  {name:"Super Rookie",min:500,bounty:"50M",emoji:"⚡"},
  {name:"Grand Line Capt",min:900,bounty:"150M",emoji:"🔥"},
  {name:"New World Pirate",min:1400,bounty:"500M",emoji:"💪"},
  {name:"Yonko Commander",min:2000,bounty:"1B",emoji:"👑"},
  {name:"PIRATE KING",min:2800,bounty:"∞",emoji:"🏆"},
];

const XP_MAP = {
  water500:10,yoga:20,posture:10,workout:30,"left-8am":20,"study-ontime":25,
  water3l:10,nojunk:15,nosugar:15,protein:10,skincare:5,sunscreen:5,
  sleep1130:15,noscreen_am:20,noscreen_pm:15,journaled:20
};

const CREW = [
  {name:"Zoro",emoji:"⚔️",xp:0,color:"#22c55e",role:"First Mate"},
  {name:"Nami",emoji:"🌊",xp:200,color:"#f59e0b",role:"Navigator"},
  {name:"Usopp",emoji:"🎯",xp:500,color:"#84cc16",role:"Sniper"},
  {name:"Sanji",emoji:"🦵",xp:900,color:"#eab308",role:"Cook"},
  {name:"Chopper",emoji:"🦌",xp:1400,color:"#f43f5e",role:"Doctor"},
  {name:"Robin",emoji:"🌸",xp:2000,color:"#8b5cf6",role:"Historian"},
  {name:"Franky",emoji:"🤖",xp:2800,color:"#3b82f6",role:"Shipwright"},
];

const ALL_HABITS = ["water500","yoga","posture","workout","left-8am","study-ontime",
  "water3l","nojunk","nosugar","protein","skincare","sunscreen","sleep1130",
  "noscreen_am","noscreen_pm","journaled"];

// ── Helpers ─────────────────────────────────────
function today() { const d=new Date(); d.setHours(0,0,0,0); return d; }
function addDays(d,n) { const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function dkey(d) { return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`; }
function dayNum(d) { return Math.round((d-START)/86400000); }
function isWO(d) { return [2,4,6].includes(d.getDay()); }
function fmtDate(d) { return `${WD[d.getDay()]}, ${d.getDate()} ${MS[d.getMonth()]}`; }
function fmtShort(d) { return `${d.getDate()} ${MS[d.getMonth()]}`; }
function fromKey(k) { const [y,m,d]=k.split("-").map(Number); return new Date(y,m,d); }
function getRank(xp) { for(let i=RANKS.length-1;i>=0;i--) if(xp>=RANKS[i].min) return RANKS[i]; return RANKS[0]; }
function getNextRank(xp) { return RANKS.find(r=>r.min>xp)||null; }

function calcXP(days,revs) {
  let xp=0;
  Object.values(days).forEach(dd=>Object.entries(dd?.checks||{}).forEach(([k,v])=>{if(v&&XP_MAP[k])xp+=XP_MAP[k];}));
  (revs||[]).forEach(e=>{if(e.d1done)xp+=20;if(e.d4done)xp+=30;if(e.d7done)xp+=50;});
  return xp;
}

function getScore(dd) {
  const done=ALL_HABITS.filter(k=>dd?.checks?.[k]).length;
  return {done,total:ALL_HABITS.length,pct:Math.round(done/ALL_HABITS.length*100)};
}

// ── Tracker Page ─────────────────────────────────
function TrackerPage({state}) {
  const TODAY=today();
  const scores=Array.from({length:30},(_,i)=>getScore(state.days[dkey(addDays(START,i))]||{}));

  let streak=0,sd=new Date(TODAY);

  return e('div',null,

      e('div',{className:'wt'},'MONKEY D. LUFFY'),

      e('div',{className:'wb'},rank.bounty),
      e('div',{className:'wby'},'BERRIES'),
      e('div',{style:{marginTop:'8px'}},

// ── Swipe Container ──────────────────────────────
function SwipeContainer({tabIdx,setTabIdx,children}) {
  const ref=useRef(null);
  const startX=useRef(null);
  const startY=useRef(null);
  const lock=useRef(null);
  const n=React.Children.count(children);
  
  const onTouchStart=ev=>{startX.current=ev.touches[0].clientX;startY.current=ev.touches[0].clientY;lock.current=null;};
  const onTouchEnd=ev=>{
    if(lock.current!=='h'||!startX.current){startX.current=null;return;}
    const dx=ev.changedTouches[0].clientX-startX.current;
    if(Math.abs(dx)>50){if(dx<0)setTabIdx(i=>Math.min(n-1,i+1));else setTabIdx(i=>Math.max(0,i-1));}
    startX.current=null;lock.current=null;
  };
  
  useEffect(()=>{
    const el=ref.current;
    if(!el) return;
    const onMove=ev=>{
      if(!startX.current) return;
      const dx=ev.touches[0].clientX-startX.current;
      const dy=ev.touches[0].clientY-startY.current;
      if(!lock.current&&(Math.abs(dx)>8||Math.abs(dy)>8)) lock.current=Math.abs(dx)>Math.abs(dy)?'h':'v';
      if(lock.current==='h') ev.preventDefault();
    };
    el.addEventListener('touchmove',onMove,{passive:false});
    return ()=>el.removeEventListener('touchmove',onMove);
  },[]);

  return e('div',{className:'swc',ref,onTouchStart,onTouchEnd},
    e('div',{className:'swt',style:{transform:`translateX(-${tabIdx*100}%)`}},
      ...React.Children.map(children,child=>e('div',{className:'swp'},child))
    )
  );
}

// ── Main App ─────────────────────────────────────
function App() {
  const [state,setState]=useState(()=>loadData());
  const [tabIdx,setTabIdx]=useState(0);
  const [toast,setToast]=useState(null);
  const [lvlUp,setLvlUp]=useState(null);
  const [delId,setDelId]=useState(null);
  const [viewDate,setViewDate]=useState(()=>today());
  const [revSubj,setRevSubj]=useState('Pharmacology');
  const [revText,setRevText]=useState('');
  const [revDate,setRevDate]=useState(()=>{const d=today();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;});
  const timer=useRef(null);
  const prevXP=useRef(calcXP(state.days,state.revs));

  const persist=useCallback(s=>{
    if(timer.current)clearTimeout(timer.current);
    timer.current=setTimeout(()=>saveData(s),500);
  },[]);

  const checkRank=useCallback((newState)=>{
    const nx=calcXP(newState.days,newState.revs);
    const g=nx-prevXP.current;
    const or=getRank(prevXP.current),nr=getRank(nx);
    if(g>0)setToast(`+${g} XP ⚡`);
    if(nr.name!==or.name&&nx>prevXP.current)setTimeout(()=>setLvlUp(nr),700);
    prevXP.current=nx;
  },[]);

  const update=useCallback(fn=>{
    setState(prev=>{const next=fn(prev);persist(next);checkRank(next);return next;});
  },[persist,checkRank]);

  const toggleCheck=useCallback((key,id)=>update(s=>{
    const dd=s.days[key]||{};
    const checks={...(dd.checks||{}),[id]:!(dd.checks?.[id])};
    return {...s,days:{...s.days,[key]:{...dd,checks}}};
  }),[update]);

  const setField=useCallback((key,f,v)=>update(s=>({
    ...s,days:{...s.days,[key]:{...(s.days[key]||{}),[f]:v}}
  })),[update]);

  const addRev=useCallback(()=>{
    if(!revText.trim())return;
    const[y,m,d]=revDate.split('-').map(Number);
    const sd=new Date(y,m-1,d);sd.setHours(0,0,0,0);
    const entry={id:state.nid,text:revText.trim(),subject:revSubj,
      studyDate:dkey(sd),rev1Date:dkey(addDays(sd,3)),rev2Date:dkey(addDays(sd,6)),
      d1done:false,d4done:false,d7done:false,addedAt:Date.now()};
    update(s=>({...s,revs:[...s.revs,entry],nid:s.nid+1}));
    setRevText('');setToast('🍎 Devil Fruit awakened! +20 XP');
  },[revText,revSubj,revDate,state.nid,update]);

  const toggleRev=useCallback((id,field)=>update(s=>({
    ...s,revs:s.revs.map(rv=>rv.id===id?{...rv,[field]:!rv[field]}:rv)
  })),[update]);

  const deleteRev=useCallback(id=>{update(s=>({...s,revs:s.revs.filter(rv=>rv.id!==id)}));setDelId(null);},[update]);
  const setReview=useCallback((rk,qk,v)=>update(s=>({...s,rvws:{...s.rvws,[rk]:{...(s.rvws[rk]||{}),[qk]:v}}})),[update]);

  const goToTab=useCallback(i=>{
    setTabIdx(i);
    document.getElementById(`tab-${i}`)?.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  },[]);

  const xp=calcXP(state.days,state.revs);
  const rank=getRank(xp);
  const nextRank=getNextRank(xp);
  const xpPct=nextRank?(xp-rank.min)/(nextRank.min-rank.min)*100:100;
  const tk=dkey(today());
  const rp=state.revs.filter(rv=>(rv.studyDate===tk&&!rv.d1done)||(rv.rev1Date===tk&&!rv.d4done)||(rv.rev2Date===tk&&!rv.d7done)).length;

  const TABS=[
    {label:'📅 Today'},
    {label:'📊 Tracker'},
    {label:`🔁 1·4·7${rp>0?` (${rp})`:''}`},
    {label:'📋 Review'},
    {label:'🏴‍☠️ Log'},
  ];

  const shared={state,toggleCheck,setField,toggleRev,setDelId,setReview};

  return e('div',{className:'app'},
    // Header
    e('div',{className:'hdr'},
      e('div',null,
        e('div',{className:'ht'},'JARVIS 30-DAY'),
        e('div',{className:'hs'},`APRIL 2026 · ${dayNum(today())>=0&&dayNum(today())<30?'DAY '+(dayNum(today())+1)+'/30':'VOYAGE'}`)
      ),
      e('div',{className:'hb'},e('div',{className:'hbl'},'BOUNTY'),e('div',{className:'hbv'},rank.bounty+'฿'))
    ),
    // Tabs
    e('div',{className:'tabs'},
      ...TABS.map((t,i)=>e('button',{key:i,id:`tab-${i}`,className:'tab'+(tabIdx===i?' on':''),onClick:()=>goToTab(i)},t.label))
    ),
    // Swipe pages
    e(SwipeContainer,{tabIdx,setTabIdx:goToTab},
      e(TodayPage,{...shared,viewDate,setViewDate}),
      e(TrackerPage,{state}),
      e(RevPage,{...shared,revSubj,setRevSubj,revText,setRevText,revDate,setRevDate,onAdd:addRev}),
      e(ReviewPage,{...shared}),
      e(LogPage,{xp,rank,nextRank,xpPct,state})
    ),
    // Dots
    e('div',{className:'dots'},
      ...TABS.map((_,i)=>e('div',{key:i,className:'dot'+(tabIdx===i?' on':''),onClick:()=>goToTab(i)}))
    ),
    // Toast
    toast?e(Toast,{msg:toast,onDone:()=>setToast(null)}):null,
    // Level up
    lvlUp?e(LvlUp,{rank:lvlUp,onClose:()=>setLvlUp(null)}):null,
    // Delete confirm
    delId?e('div',{className:'mov',onClick:()=>setDelId(null)},
      e('div',{className:'modal',onClick:ev=>ev.stopPropagation()},
        e('span',{className:'mem'},'⚠️'),
        e('div',{className:'mtt'},'Abandon Ability?'),
        e('div',{className:'mbd'},'Removes topic and all 3 revisions.'),
        e('div',{className:'mbr'},
          e('button',{className:'mbt s',onClick:()=>setDelId(null)},'Cancel'),
          e('button',{className:'mbt p',onClick:()=>deleteRev(delId)},'Delete')
        )
      )
    ):null
  );
}

// Mount
ReactDOM.createRoot(document.getElementById('root')).render(e(App));

</script>
