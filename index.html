<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1e3a5f">
<title>Jarvis 30-Day</title>
<link rel="manifest" href="manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#fef9f0;--card:#fff;--c2:#fdf5e6;--bd:#f0d9a0;
  --ink:#1a0a00;--mt:#8b6914;
  --red:#dc2626;--gold:#d97706;--navy:#1e3a5f;
  --blue:#3b82f6;--purple:#7c3aed;--orange:#ea580c;
  --green:#059669;--hk:#f97316;--teal:#0f766e;
}
@import url('https://fonts.googleapis.com/css2?family=Pirata+One&family=DM+Sans:wght@400;500;600&display=swap');
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--ink);font-family:'DM Sans',sans-serif,system-ui;font-size:14px}
.app{display:flex;flex-direction:column;height:100vh;max-width:500px;margin:0 auto}
/* Header */
.hdr{background:var(--navy);border-bottom:3px solid #ffd700;padding:10px 14px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.ht{font-family:'Pirata One',Georgia,serif;font-size:18px;color:#ffd700;line-height:1}
.hs{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:#94a3b8;margin-top:2px}
.hb{background:#0f2540;border:1.5px solid #ffd700;border-radius:5px;padding:4px 10px;text-align:center}
.hbl{font-size:7px;letter-spacing:.15em;text-transform:uppercase;color:#94a3b8}
.hbv{font-family:'Pirata One',Georgia,serif;font-size:13px;color:#ffd700;line-height:1}
/* Tabs */
.tabs{background:var(--card);border-bottom:2px solid var(--bd);display:flex;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:10px 13px;border:none;background:none;cursor:pointer;white-space:nowrap;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--mt);position:relative;flex-shrink:0;font-family:inherit}
.tab.on{color:var(--red);font-weight:600}
.tab.on::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:2px;background:var(--red)}
/* Pages */
.pages{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px;display:none}
.page.on{display:block}
/* Date nav */
.dnav{background:var(--navy);border:2px solid #ffd700;border-radius:7px;padding:9px 13px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.dnav button{background:none;border:1.5px solid #ffd700;border-radius:4px;color:#ffd700;padding:5px 11px;font-size:11px;cursor:pointer;font-family:inherit}
.dnav button:disabled{opacity:.25}
.dnav-c{text-align:center}
.dnav-l{font-family:'Pirata One',Georgia,serif;font-size:14px;color:#ffd700}
.dnav-s{font-size:9px;color:#94a3b8;margin-top:1px}
/* Section cards */
.sc{background:var(--card);border:2px solid var(--bd);border-radius:8px;padding:12px;margin-bottom:7px}
.sc.op{border-top:3px solid var(--red)}
.sc.gr{border-top:3px solid var(--green)}
.sc.hk{border-top:3px solid var(--hk)}
.sc.na{border-top:3px solid var(--orange)}
.sc.dt{border-top:3px solid var(--purple)}
.sc-t{font-family:'Pirata One',Georgia,serif;font-size:14px;margin-bottom:8px;display:flex;align-items:center;gap:8px}
/* Checklist */
.ci{display:flex;align-items:center;gap:9px;padding:9px 10px;margin-bottom:3px;background:var(--c2);border-radius:6px;cursor:pointer;user-select:none;-webkit-user-select:none}
.ci.ck{background:#f0fdf4}
.ci.ck .ct{color:var(--green);text-decoration:line-through}
.cb{width:20px;height:20px;border-radius:5px;border:1.5px solid var(--bd);background:white;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;transition:all .15s}
.ci.ck .cb{background:#22c55e;border-color:#22c55e;color:white}
.ct{font-size:13px;color:var(--ink);flex:1;line-height:1.3}
.xc{font-size:9px;color:var(--gold);font-weight:700;white-space:nowrap}
/* Inputs */
textarea,input[type=text],input[type=date]{background:var(--c2);border:1.5px solid var(--bd);border-radius:6px;color:var(--ink);font-family:inherit;outline:none}
textarea{width:100%;padding:8px 10px;font-size:12px;resize:none;margin-top:6px}
textarea:focus,input:focus{border-color:var(--gold)}
.sr{display:flex;align-items:center;gap:7px;padding:7px 10px;background:var(--c2);border-radius:6px;margin-bottom:3px}
.sr span{font-size:12px;color:var(--ink);flex:1}
.sr input{background:white;border:1.5px solid var(--bd);border-radius:5px;padding:4px 8px;color:var(--ink);font-size:12px;width:110px;text-align:center}
/* Mood */
.mr{display:flex;align-items:center;gap:9px;padding:8px 10px;background:var(--c2);border-radius:6px;margin-bottom:3px}
.mr span.ml{font-size:12px;width:76px;flex-shrink:0}
.mr span.mv{font-family:'Pirata One',Georgia,serif;font-size:15px;width:32px;text-align:center;flex-shrink:0}
input[type=range]{flex:1;height:4px;background:var(--bd);border-radius:2px;border:none;outline:none}
/* Score box */
.sb{background:var(--navy);border:2px solid #ffd700;border-radius:8px;padding:14px;text-align:center;margin-bottom:7px}
.sp{font-family:'Pirata One',Georgia,serif;font-size:38px;color:#ffd700;line-height:1;margin-bottom:4px}
.ss{font-size:11px;color:#94a3b8}
.sbar{height:7px;background:#2d3748;border-radius:4px;margin-top:10px;overflow:hidden}
.sf{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--red),#ffd700);transition:width .5s}
/* Stats */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:10px}
.stc{background:var(--navy);border:2px solid #ffd700;border-radius:7px;padding:11px 8px;text-align:center}
.stv{font-family:'Pirata One',Georgia,serif;font-size:21px;color:#ffd700;line-height:1;margin-bottom:2px}
.stl{font-size:8px;letter-spacing:.08em;text-transform:uppercase;color:#94a3b8}
/* Grid */
.g30{display:grid;grid-template-columns:repeat(6,1fr);gap:3px;margin:8px 0}
.gc{aspect-ratio:1;border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:9px;font-weight:700;border:1.5px solid transparent}
.gc.gt{background:var(--red);color:white;border-color:#991b1b}
.gc.gf{background:#22c55e;color:white;border-color:#16a34a}
.gc.gp{background:#fef3c7;color:var(--gold);border-color:var(--gold)}
.gc.gm{background:#fef2f2;color:#fca5a5;border-color:#fca5a5}
.gc.gu{background:#f5f5f0;color:#d4c4a0}
.gcs{font-size:7px;display:block}
.leg{display:flex;gap:10px;flex-wrap:wrap;margin-top:7px}
.li{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--mt)}
.ld{width:10px;height:10px;border-radius:2px}
/* Habit bars */
.hbr{margin-bottom:7px}
.hbt{display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px}
.hbk{height:4px;background:var(--bd);border-radius:2px;overflow:hidden}
.hbf{height:100%;border-radius:2px;transition:width .4s}
/* Wanted */
.wanted{background:var(--c2);border:2.5px solid #ffd700;border-radius:10px;padding:14px;margin-bottom:10px;text-align:center;box-shadow:3px 3px 0 var(--gold)}
.wt{font-family:'Pirata One',Georgia,serif;font-size:10px;letter-spacing:.3em;color:var(--mt)}
.wr{font-family:'Pirata One',Georgia,serif;font-size:18px;color:var(--red);margin-bottom:2px}
.wb{font-family:'Pirata One',Georgia,serif;font-size:30px;color:var(--navy);line-height:1}
.wby{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--mt);margin-bottom:8px}
.xbar{height:7px;background:#f0d9a0;border-radius:4px;overflow:hidden;border:1px solid var(--gold);margin-top:4px}
.xf{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--red),#ffd700)}
/* Crew */
.cg{display:grid;grid-template-columns:repeat(2,1fr);gap:5px;margin-bottom:10px}
.cc{background:var(--card);border:2px solid var(--bd);border-radius:8px;padding:10px;text-align:center}
.cc.lk{opacity:.35;filter:grayscale(1)}
/* Revision */
.rf{background:var(--card);border:2px solid var(--bd);border-radius:8px;padding:12px;margin-bottom:10px}
.rt{font-family:'Pirata One',Georgia,serif;font-size:15px;color:var(--red);margin-bottom:10px}
.fg{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.fb{padding:4px 10px;border-radius:20px;border:1.5px solid var(--bd);background:none;color:var(--mt);font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s}
.fb.on{color:white;border-color:transparent}
.re{background:var(--card);border:2px solid var(--bd);border-radius:8px;padding:11px 12px;margin-bottom:4px;display:flex;align-items:flex-start;gap:9px}
.re .info{flex:1;min-width:0}
.re .top{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:4px}
.rsj{font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:2px 7px;border-radius:3px;color:white;font-weight:600}
.rty{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--mt)}
.rty.d1{color:var(--green)}.rty.d4{color:var(--blue)}.rty.d7{color:var(--gold)}
.re .acts{display:flex;flex-direction:column;gap:5px;flex-shrink:0}
.ck{width:22px;height:22px;border-radius:5px;border:1.5px solid var(--bd);background:white;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px}
.ck.on{background:#22c55e;border-color:#22c55e;color:white}
.dl{width:20px;height:20px;border:none;background:none;color:var(--mt);cursor:pointer;font-size:16px;line-height:1}
.em2{padding:13px;background:var(--c2);border-radius:7px;font-size:12px;color:var(--mt);text-align:center;margin-bottom:6px}
/* Review */
.rv{background:var(--card);border:2px solid var(--bd);border-radius:8px;padding:13px;margin-bottom:8px}
.rq{font-size:12px;font-weight:600;color:var(--ink);margin:9px 0 4px}
.rq:first-child{margin-top:0}
.rstat{display:flex;justify-content:space-between;align-items:center;padding:7px 10px;background:var(--c2);border-radius:5px;margin-bottom:3px}
/* Misc */
.sl{font-size:9px;letter-spacing:.22em;text-transform:uppercase;margin:14px 0 8px;color:var(--mt)}
.sl:first-child{margin-top:0}
.cc2{display:flex;gap:11px;background:var(--card);border:2px solid var(--bd);border-radius:7px;padding:10px 12px;margin-bottom:4px}
.th{border-radius:8px;padding:12px 14px;margin-bottom:10px}
.th.op{background:linear-gradient(135deg,#1e3a5f,#0f2540);border:2px solid #ffd700;color:#fff}
/* Dots */
.dots{display:flex;justify-content:center;gap:6px;padding:5px 0 3px;flex-shrink:0;background:var(--bg)}
.dot{width:6px;height:6px;border-radius:50%;background:var(--bd);cursor:pointer;border:none;transition:all .2s}
.dot.on{background:var(--red);width:18px;border-radius:3px}
/* Toast */
.toast{position:fixed;top:68px;left:50%;transform:translateX(-50%);background:var(--navy);border:2px solid #ffd700;border-radius:7px;padding:9px 18px;color:#ffd700;font-family:'Pirata One',Georgia,serif;font-size:15px;z-index:999;pointer-events:none;animation:ti .3s;white-space:nowrap}
@keyframes ti{from{opacity:0;transform:translateX(-50%) translateY(-8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
/* Modal */
.mov{position:fixed;inset:0;background:#00000099;display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
.modal{background:var(--c2);border:2.5px solid #ffd700;border-radius:12px;padding:20px;width:100%;max-width:360px;text-align:center;box-shadow:5px 5px 0 var(--gold)}
.modal h2{font-family:'Pirata One',Georgia,serif;font-size:24px;color:var(--red);margin-bottom:4px}
.modal h3{font-family:'Pirata One',Georgia,serif;font-size:16px;color:var(--navy);margin-bottom:10px}
.modal p{font-size:12px;color:var(--mt);line-height:1.6;margin-bottom:14px}
.modal button{padding:11px 20px;border:none;border-radius:7px;background:var(--red);color:white;font-family:'Pirata One',Georgia,serif;font-size:16px;cursor:pointer;width:100%}
.mbr{display:flex;gap:8px;margin-top:12px}
.mbr button{flex:1;padding:10px;border:none;border-radius:6px;font-family:'Pirata One',Georgia,serif;font-size:13px;cursor:pointer}
.mbr button.p{background:var(--red);color:white}
.mbr button.s{background:var(--c2);color:var(--mt);border:1.5px solid var(--bd)}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="hdr">
    <div>
      <div class="ht">JARVIS 30-DAY</div>
      <div class="hs" id="hdr-sub">APRIL 2026</div>
    </div>
    <div class="hb">
      <div class="hbl">BOUNTY</div>
      <div class="hbv" id="bounty-val">0฿</div>
    </div>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="pages" id="pages"></div>
  <div class="dots" id="dots"></div>
</div>

<script>
// ═══════════════════════════════════════
// JARVIS 30-DAY — Zero Dependencies
// Pure HTML + CSS + Vanilla JS
// No React. No CDN. Instant load.
// ═══════════════════════════════════════

// ── Storage & Migration ──────────────────────────
const KEY = 'jarvis-master';
const VER = 2;

function fresh() { return {version:VER,days:{},revs:[],nid:1,rvws:{}}; }

function migrate(raw) {
  if (!raw) return fresh();
  let d; try { d = JSON.parse(raw); } catch { return fresh(); }
  if (!d.version) d = {version:1,days:d.days||d.dayData||{},revs:d.revs||d.entries||[],nid:d.nid||d.nextId||1,rvws:d.rvws||d.reviews||{}};
  if (d.version < 2) {
    const sm={"Physio":"Physiology","Pharma":"Pharmacology","Patho":"Pathology","Med":"Medicine","Biochem":"Biochemistry","Micro":"Microbiology"};
    d.revs=(d.revs||[]).map(e=>({...e,subject:sm[e.subject]||e.subject||'Other'}));
    d.version=2;
  }
  return {version:VER,days:d.days||{},revs:d.revs||[],nid:d.nid||1,rvws:d.rvws||{}};
}

function load() { try { return migrate(localStorage.getItem(KEY)); } catch { return fresh(); } }
let saveTimer;
function save() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{ try{localStorage.setItem(KEY,JSON.stringify({...S,version:VER}));}catch{} },500);
}

// ── State ────────────────────────────────────────
let S = load();

// ── Constants ────────────────────────────────────
const START = new Date(2026,3,1);
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const WDAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

const SUBJECTS = {
  'Physiology':{c:'#f43f5e',em:'🫀'},'Pharmacology':{c:'#8b5cf6',em:'⚗️'},
  'Pathology':{c:'#334155',em:'🔬'},'Medicine':{c:'#0ea5e9',em:'⚕️'},
  'PSM':{c:'#10b981',em:'📊'},'Biochemistry':{c:'#f59e0b',em:'🧬'},
  'Microbiology':{c:'#84cc16',em:'🦠'},'Anatomy':{c:'#e11d48',em:'🦴'},
  'FMT':{c:'#0891b2',em:'⚖️'},'Ophthalmology':{c:'#f97316',em:'👁️'},
  'ENT':{c:'#7c3aed',em:'👂'},'Dermatology':{c:'#db2777',em:'🧴'},
  'Anaesthesia':{c:'#64748b',em:'💉'},'Radiology':{c:'#0284c7',em:'🔭'},
  'Psychiatry':{c:'#9333ea',em:'🧠'},'Orthopaedics':{c:'#b45309',em:'🦿'},
  'Paediatrics':{c:'#16a34a',em:'👶'},'OBG':{c:'#be185d',em:'🌸'},
  'Surgery':{c:'#dc2626',em:'🔪'},'Other':{c:'#6b7280',em:'📚'}
};

const RANKS = [
  {name:'East Blue Rookie',min:0,bounty:'0',emoji:'📖'},
  {name:'Pirate',min:200,bounty:'10M',emoji:'🏴‍☠️'},
  {name:'Super Rookie',min:500,bounty:'50M',emoji:'⚡'},
  {name:'Grand Line Capt',min:900,bounty:'150M',emoji:'🔥'},
  {name:'New World Pirate',min:1400,bounty:'500M',emoji:'💪'},
  {name:'Yonko Commander',min:2000,bounty:'1B',emoji:'👑'},
  {name:'PIRATE KING',min:2800,bounty:'∞',emoji:'🏆'},
];

const XP_MAP = {water500:10,yoga:20,posture:10,workout:30,'left-8am':20,'study-ontime':25,water3l:10,nojunk:15,nosugar:15,protein:10,skincare:5,sunscreen:5,sleep1130:15,noscreen_am:20,noscreen_pm:15,journaled:20};

const CREW = [
  {name:'Zoro',emoji:'⚔️',xp:0,color:'#22c55e',role:'First Mate'},
  {name:'Nami',emoji:'🌊',xp:200,color:'#f59e0b',role:'Navigator'},
  {name:'Usopp',emoji:'🎯',xp:500,color:'#84cc16',role:'Sniper'},
  {name:'Sanji',emoji:'🦵',xp:900,color:'#eab308',role:'Cook'},
  {name:'Chopper',emoji:'🦌',xp:1400,color:'#f43f5e',role:'Doctor'},
  {name:'Robin',emoji:'🌸',xp:2000,color:'#8b5cf6',role:'Historian'},
  {name:'Franky',emoji:'🤖',xp:2800,color:'#3b82f6',role:'Shipwright'},
];

const ALL_HABITS = ['water500','yoga','posture','workout','left-8am','study-ontime','water3l','nojunk','nosugar','protein','skincare','sunscreen','sleep1130','noscreen_am','noscreen_pm','journaled'];

// ── Helpers ──────────────────────────────────────
function today() { const d=new Date(); d.setHours(0,0,0,0); return d; }
function addDays(d,n) { const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function dkey(d) { return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`; }
function dayNum(d) { return Math.round((d-START)/86400000); }
function isWO(d) { return [2,4,6].includes(d.getDay()); }
function fmtDate(d) { return `${WDAYS[d.getDay()]}, ${d.getDate()} ${MONTHS[d.getMonth()]}`; }
function fmtShort(d) { return `${d.getDate()} ${MONTHS[d.getMonth()]}`; }
function fromKey(k) { const [y,m,d]=k.split('-').map(Number); return new Date(y,m,d); }
function getRank(xp) { for(let i=RANKS.length-1;i>=0;i--) if(xp>=RANKS[i].min) return RANKS[i]; return RANKS[0]; }
function getNext(xp) { return RANKS.find(r=>r.min>xp)||null; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function calcXP() {
  let xp=0;
  Object.values(S.days).forEach(dd=>Object.entries(dd?.checks||{}).forEach(([k,v])=>{if(v&&XP_MAP[k])xp+=XP_MAP[k];}));
  S.revs.forEach(e=>{if(e.d1done)xp+=20;if(e.d4done)xp+=30;if(e.d7done)xp+=50;});
  return xp;
}

function getScore(dd) {
  const done=ALL_HABITS.filter(k=>dd?.checks?.[k]).length;
  return {done,total:ALL_HABITS.length,pct:Math.round(done/ALL_HABITS.length*100)};
}

// ── DOM helpers ──────────────────────────────────
function h(tag,attrs='',inner='') { return `<${tag}${attrs?' '+attrs:''}>${inner}</${tag}>`; }
function div(cls,inner,extra='') { return `<div class="${cls}"${extra}>${inner}</div>`; }

// ── UI State ─────────────────────────────────────
let currentTab = 0;
let viewDate = today();
let revFilter = 'Today';
let revSubj = 'Pharmacology';
let reviewType = 'daily';
let prevXP = calcXP();

const TABS = ['📅 Today','📊 Tracker','🔁 1·4·7','📋 Review','🏴‍☠️ Log'];

// ── Toast ────────────────────────────────────────
function showToast(msg) {
  const existing = document.querySelector('.toast');
  if(existing) existing.remove();
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 1800);
}

// ── Modal ─────────────────────────────────────────
function showModal(content) {
  const ov = document.createElement('div');
  ov.className = 'mov'; ov.innerHTML = `<div class="modal">${content}</div>`;
  ov.addEventListener('click', e=>{ if(e.target===ov) ov.remove(); });
  document.body.appendChild(ov);
  return ov;
}

// ── XP & Rank check ──────────────────────────────
function checkRankUp() {
  const newXP = calcXP();
  const gained = newXP - prevXP;
  if(gained > 0) showToast(`+${gained} XP ⚡`);
  const oldR = getRank(prevXP), newR = getRank(newXP);
  if(newR.name !== oldR.name && newXP > prevXP) {
    setTimeout(()=>{
      const m = showModal(`<span style="font-size:44px;display:block;margin-bottom:8px">${newR.emoji}</span><h2>RANK UP!!</h2><h3>${newR.name}</h3><p>Bounty: <strong>${newR.bounty} Berries!</strong></p><button onclick="this.closest('.mov').remove()">YOSH! LET'S GO! 🏴‍☠️</button>`);
    }, 700);
  }
  prevXP = newXP;
}

// ── Render ───────────────────────────────────────
function render() {
  renderHeader();
  renderTabs();
  renderPages();
  renderDots();
  attachHandlers();
}

function renderHeader() {
  const xp = calcXP();
  const rank = getRank(xp);
  const dn = dayNum(today());
  document.getElementById('hdr-sub').textContent = `APRIL 2026 · ${dn>=0&&dn<30?`DAY ${dn+1}/30`:'VOYAGE'}`;
  document.getElementById('bounty-val').textContent = rank.bounty + '฿';
}

function renderTabs() {
  const rp = S.revs.filter(e=>{
    const tk=dkey(today());
    return (e.studyDate===tk&&!e.d1done)||(e.rev1Date===tk&&!e.d4done)||(e.rev2Date===tk&&!e.d7done);
  }).length;
  const labels = [...TABS];
  if(rp>0) labels[2] = `🔁 1·4·7 (${rp})`;
  document.getElementById('tabs').innerHTML = labels.map((l,i)=>
    `<button class="tab${currentTab===i?' on':''}" data-tab="${i}">${l}</button>`
  ).join('');
}

function renderDots() {
  document.getElementById('dots').innerHTML = TABS.map((_,i)=>
    `<button class="dot${currentTab===i?' on':''}" data-tab="${i}"></button>`
  ).join('');
}

function renderPages() {
  const pagesEl = document.getElementById('pages');
  pagesEl.innerHTML = TABS.map((_,i)=>
    `<div class="page${currentTab===i?' on':''}" id="page-${i}">${renderPage(i)}</div>`
  ).join('');
}

function renderPage(i) {
  if(i===0) return renderToday();
  if(i===1) return renderTracker();
  if(i===2) return renderRevision();
  if(i===3) return renderReview();
  if(i===4) return renderLog();
  return '';
}

// ── TRACKER PAGE ─────────────────────────────────
function renderTracker() {
  const TODAY=today();
  const scores=Array.from({length:30},(_,i)=>getScore(S.days[dkey(addDays(START,i))]||{}));
  const elapsed=Math.max(1,Array.from({length:30},(_,i)=>addDays(START,i)).filter(d=>d<=TODAY).length);
  const avg=Math.round(scores.slice(0,elapsed).reduce((a,s)=>a+s.pct,0)/elapsed);
  const perfect=scores.filter((s,i)=>addDays(START,i)<=TODAY&&s.pct===100).length;
  let streak=0,sd=new Date(TODAY);
  while(sd>=START){const{pct}=getScore(S.days[dkey(sd)]||{});if(pct===100){streak++;sd.setDate(sd.getDate()-1);}else break;}

  const gridHTML = Array.from({length:30},(_,i)=>{
    const date=addDays(START,i);
    const isT=dkey(date)===dkey(TODAY),isF=date>TODAY;
    const{pct}=scores[i];
    const cls=isT?'gt':isF?'gu':pct===100?'gf':pct>0?'gp':'gm';
    return `<div class="gc ${cls}">${date.getDate()}${!isF&&!isT?`<span class="gcs">${pct}%</span>`:''}</div>`;
  }).join('');

  const bars=[
    ['💧 Water 500ml','water500','var(--green)'],['🌊 Yoga','yoga','var(--green)'],
    ['⚔️ Workout','workout','var(--red)'],['📖 Study on time','study-ontime','var(--red)'],
    ['💧 Water 3L','water3l','var(--hk)'],['🥦 No junk','nojunk','var(--hk)'],
    ['✨ Skincare','skincare','var(--hk)'],['🌙 Sleep 11:30','sleep1130','var(--blue)'],
    ['📵 No screen AM','noscreen_am','var(--purple)'],['📝 Journaled','journaled','var(--orange)'],
  ].map(([lbl,id,col])=>{
    const done=Array.from({length:30},(_,i)=>addDays(START,i)).filter(d=>d<=TODAY&&S.days[dkey(d)]?.checks?.[id]).length;
    const pct=Math.round(done/elapsed*100);
    return `<div class="hbr">
      <div class="hbt"><span>${lbl}</span><span style="color:${col};font-weight:600">${done}/${elapsed}d</span></div>
      <div class="hbk"><div class="hbf" style="width:${pct}%;background:${col}"></div></div>
    </div>`;
  }).join('');

  return `
  <div class="stats">
    <div class="stc"><div class="stv">${streak}</div><div class="stl">🔥 Streak</div></div>
    <div class="stc"><div class="stv">${avg}%</div><div class="stl">📊 Avg Score</div></div>
    <div class="stc"><div class="stv">${perfect}</div><div class="stl">⭐ Perfect Days</div></div>
  </div>
  <div class="sl" style="color:var(--red)">📊 30-Day Grand Line Map</div>
  <div class="g30">${gridHTML}</div>
  <div class="leg">
    <div class="li"><div class="ld" style="background:#22c55e"></div>100%</div>
    <div class="li"><div class="ld" style="background:#fef3c7;border:1px solid var(--gold)"></div>Partial</div>
    <div class="li"><div class="ld" style="background:#fef2f2;border:1px solid #fca5a5"></div>Missed</div>
    <div class="li"><div class="ld" style="background:#f5f5f0"></div>Upcoming</div>
  </div>
  <div class="sl" style="color:var(--hk);margin-top:16px">🏐 Habit Consistency</div>
  ${bars}
  <div style="height:16px"></div>`;
}
